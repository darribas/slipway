<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Slipway — Quarto reveal.js authoring</title>
  <meta name="description" content="Offline-capable Quarto reveal.js slide authoring for iPad and desktop.">
  <!-- iOS PWA chrome: hides Safari URL bar when installed via Add-to-Home-Screen
       and lets viewport-fit=cover + env(safe-area-inset-*) lay out around the
       status bar / home indicator correctly. theme-color matches the icon's
       sky-blue background for visual continuity. -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Slipway">
  <meta name="theme-color" content="#B8D6EE">
  <!-- Browser favicons get the rounded SVG; iOS apple-touch-icon and Android
       PWA icons get the square PNGs (the OS adds its own rounding/masking). -->
  <link rel="icon" type="image/svg+xml" href="./icon.svg">
  <link rel="apple-touch-icon" href="./icon-180.png">
  <link rel="manifest" href="./manifest.webmanifest">
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
