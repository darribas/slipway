# PR gate. Runs the smoke test + typecheck + production build on every
# pull request targeting main, so a broken commit can't merge.
# The deploy workflow runs the same steps on main itself before publishing.

name: CI

on:
  pull_request:
    branches: [main]
  # Lets us run the same checks manually from the Actions tab on any branch.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: app

      - name: Smoke test (vitest)
        run: npm test
        working-directory: app

      - name: Typecheck + build
        run: npm run build
        working-directory: app
